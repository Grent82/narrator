services:
  backend:
    build: .
    command: sh -c "python /app/tools/wait_for_db.py && alembic upgrade head && python -m src.backend.main"
    env_file:
      - .env
    ports:
      - "17000:17000"
    volumes:
      - .:/app
    environment:
      - BACKEND_HOST=0.0.0.0
      - BACKEND_PORT=17000
      - FRONTEND_ORIGINS=http://localhost:17080,http://127.0.0.1:17080
      - DB_URL=postgresql://narrator:narrator@db:5432/narrator
      - POSTGRES_HOST=db
      - POSTGRES_PORT=5432
      - POSTGRES_USER=narrator
      - POSTGRES_PASSWORD=narrator
      - POSTGRES_DB=narrator
      - POSTGRES_WAIT_TIMEOUT=60
      - PYTHONPATH=/app
    depends_on:
      - db
      - qdrant

  frontend:
    image: node:22-slim
    working_dir: /app/frontend
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 17080"
    ports:
      - "17080:17080"
    volumes:
      - .:/app
    environment:
      - VITE_BACKEND_PROXY_TARGET=http://backend:17000
    depends_on:
      - backend

  db:
    image: postgres:16
    environment:
      - POSTGRES_USER=narrator
      - POSTGRES_PASSWORD=narrator
      - POSTGRES_DB=narrator
    ports:
      - "15432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data

  adminer:
    image: adminer:latest
    ports:
      - "18080:8080"
    depends_on:
      - db

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11435:11434"
    volumes:
      - ollama-data:/root/.ollama
      - ./docker/ollama/init.sh:/init.sh:ro
    entrypoint: ["/init.sh"]
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "16333:6333"
    volumes:
      - qdrant-data:/qdrant/storage

volumes:
  ollama-data:
  qdrant-data:
